name: Full Stock Analysis

on:
  schedule:
    # Run at 9:30 PM IST (1 hour after market close)
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Main Calculator (Fetch Data & Calculate Indicators)
        run: python calculate.py

      - name: Run EMA Scanner
        run: python scanner/scanner.py

      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes
          git pull origin main --rebase || true
          
          # Add all changes
          git add data/processed/ data/results.json
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update stock analysis [skip ci]"
            git push origin main
          fi
